<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=home.html">
    <title>Blue Horizon</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #001220, #001f3f, #000000);
            color: white;
            background-attachment: fixed;
        
            display: flex;
            justify-content: center;   
            align-items: center;       
            height: 100vh;             
        }
        
        .logo{
            margin-top: 20px;
            height:150px;
            width:auto;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        .card {
            border: none;
            background: linear-gradient(to bottom, #001220, #001f3f, #000000);
            opacity: 0.9;
            border-radius: 10px;
            padding: 10px 0 10px 0;
            overflow: hidden;
            box-shadow: 0 4px 8px black;
            color: white;
            max-width: 900px;
            width: 90%;
            height: auto;
            text-align: center;
        }
        .members{
            text-align: center;
        }
        .members h3{
            text-align: left;
            margin-left: 20px;
            font-size: 18px;
        }

        .cardRow{
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card2{
            background: linear-gradient(to bottom, #001220, #001f3f, #000000);
            border: none;
            border-radius: 10px;
            padding:0px 40px 0px 40px;
            box-shadow: 0 4px 8px black;
        }
        .mission{
            font-weight: bold;
        }

        .card2 hr{
            margin-top: 0px;
        }

        button{
            position: absolute;
            right: 50px;
            bottom: 30px;
            padding: 10px 20px;
            font-size: 16px;  
            background-color: #0d1a1b; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
        }
        button:hover{
            background-color: #0097a7;
            transform: scale(1.05);
        }
        hr{
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, skyblue, transparent);
            margin-left: 10%;
            margin-right: 10%;
            margin-top: 20px;
        }
       
        .bar{
            width: 80%;
            height:20px;
            background:#333;
            margin:20px auto;
            border-radius:10px;
            overflow:hidden;
        }

        .fill{
            height:100%;
            width:0%;
            background:#00bcd4;
            animation:load 4s linear forwards;
        }

        @keyframes load{
            from{width:0%;}
            to{width:100%;}
        }
        
        .bg{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-1;
            filter:brightness(0.2); 
        }
  
    </style>
    
</head>

<body>
    <img src="images/splashimg.jpg" alt="Photo by Tom Fisk: https://www.pexels.com/photo/a-school-of-fish-swimming-under-the-sea-4618220/" class="bg">
    
<div class="card">
    
    <img src="images/LOGOW.png" alt="Blue Horizon Logo" class="logo">
    <hr>
    
    <br>
    <p class="mission">Our mission is to promote sustainable technology solutions aligned with global development goals.</p>    
    <div class="bar">
        <div class="fill"></div>
    </div>
    <p id="countdown">Entering site in 4...</p>
    <div class="members">
        <h3>Group Members : </h3>
        <div class="cardRow">
        <div class="card2">
            <h4>Vimuth Perera</h4>
            <hr>
        </div>
        <div class="card2">
            <h4>Bihara Jayawardhana</h4>
            <hr>
        </div>
        <div class="card2">
            <h4>Janin Bandara</h4>
            <hr>
        </div>
        <div class="card2">
            <h4>Akash Karunakaran</h4>
            <hr>
        </div>
    </div>
    </div>
</div>
    <button onclick="window.location.href='home.html';">skip Intro</button>
    <script>

        let time = 4;
        let countdown = document.getElementById("countdown");

        let timer = setInterval(function(){
            time--;
            countdown.textContent = "Entering site in " + time + "...";

            if(time <= 0){
                clearInterval(timer);
            }
        },1000);
    </script>

</body>

</html>
